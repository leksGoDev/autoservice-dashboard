<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta name="theme-color" content="#0f1115" />
    <link rel="icon" type="image/png" href="%BASE_URL%pwa-icon-192.png" />
    <title>Autoservice Operations Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      (function (location) {
        if (!location.search.startsWith("?/")) {
          return;
        }

        var restoredPath = location.search
          .slice(1)
          .split("&")
          .map(function (segment) {
            return segment.replace(/~and~/g, "&");
          })
          .join("?");

        window.history.replaceState(null, "", location.pathname.slice(0, -1) + restoredPath + location.hash);
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
